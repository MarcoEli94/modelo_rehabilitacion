services:
  ollama:
    image: ollama/ollama:latest
    container_name: rehab-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-model-init:
    image: ollama/ollama:latest
    container_name: rehab-ollama-model-init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://${OLLAMA_HOST:-ollama}:11434
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME:-qwen2.5:1.5b}
      - OLLAMA_MODEL_NAME_M07=${OLLAMA_MODEL_NAME_M07:-qwen2.5:1.5b}
      - OLLAMA_MODEL_NAME_M09=${OLLAMA_MODEL_NAME_M09:-qwen2.5:1.5b}
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        until ollama list >/dev/null 2>&1; do
          echo "Esperando a Ollama..."
          sleep 2
        done
        for model_name in "${OLLAMA_MODEL_NAME}" "${OLLAMA_MODEL_NAME_M07}" "${OLLAMA_MODEL_NAME_M09}"; do
          if [ -n "$$model_name" ] && ! ollama list | awk 'NR>1 {print $1}' | grep -Fxq "$$model_name"; then
            echo "Descargando modelo: $$model_name"
            ollama pull "$$model_name"
          fi
        done
        echo "Modelos Ollama listos"
    restart: "no"
    profiles:
      - model-init

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: rehab-api
    restart: unless-stopped
    depends_on:
      - ollama
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://${OLLAMA_HOST:-ollama}:11434/api/chat
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME:-qwen2.5:1.5b}
      - OLLAMA_MODEL_NAME_M07=${OLLAMA_MODEL_NAME_M07:-qwen2.5:1.5b}
      - OLLAMA_MODEL_NAME_M09=${OLLAMA_MODEL_NAME_M09:-qwen2.5:1.5b}
    ports:
      - "${API_PORT:-8000}:8000"

volumes:
  ollama_data:
