services:
  ollama:
    image: ollama/ollama:latest
    container_name: rehab-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-model-init:
    image: ollama/ollama:latest
    container_name: rehab-ollama-model-init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME:-qwen2.5:7b}
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        until ollama list >/dev/null 2>&1; do
          echo "Esperando a Ollama..."
          sleep 2
        done
        ollama pull "${OLLAMA_MODEL_NAME}"
        echo "Modelo listo: ${OLLAMA_MODEL_NAME}"
    restart: "no"
    profiles:
      - model-init

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: rehab-api
    restart: unless-stopped
    depends_on:
      - ollama
    env_file:
      - .env
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434/api/chat}
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME:-qwen2.5:7b}
    ports:
      - "${API_PORT:-8000}:8000"

volumes:
  ollama_data:
